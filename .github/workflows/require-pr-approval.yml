name: Require PR Approval

# Enforces the policy that every change to the default branch must:
#   1. Arrive via a pull request (guaranteed by the `pull_request` trigger)
#   2. Have at least 1 approving review before it can be merged
#
# Add this workflow as a required status check in
# Settings → Branches → Branch protection rules → "Require status checks to
# pass before merging" → search for "PR & Approval Required".
#
# The CODEOWNERS file ensures @MuhammadMuneebMubashar is automatically
# requested as a reviewer on every PR.

on:
  pull_request:
    branches:
      - main
      - master
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  approval-gate:
    name: PR & Approval Required
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Check for at least 1 approving review
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request
                ? context.payload.pull_request.number
                : context.payload.review.pull_request.number,
            });

            const approvals = reviews.filter(r => r.state === 'APPROVED');

            if (approvals.length === 0) {
              core.setFailed(
                '❌ This PR requires at least 1 approving review before it can be merged.'
              );
            } else {
              console.log(`✅ Found ${approvals.length} approving review(s). Policy satisfied.`);
            }
